<app-header title="Progress - Range"></app-header>

<ion-content class="ion-padding">

  <ion-progress-bar type="determinate" [value]="porcentaje" color="primary"></ion-progress-bar>

  <ion-list>
    <ion-item>

      <ion-range min="0" max="100" (ionChange)="rangeChange( $event )">
        <ion-icon size="small" slot="start" name="sunny"></ion-icon>
        <ion-icon slot="end" name="sunny"></ion-icon>
      </ion-range>

    </ion-item>

    <ion-item>

      <ion-progress-bar type="indeterminate" color="primary"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="secondary"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="tertiary"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="success"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="warning"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="danger"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="light"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="medium"></ion-progress-bar>
      <ion-progress-bar type="indeterminate" color="dark"></ion-progress-bar>
    </ion-item>

    <ion-list>
      <ion-item>
        <ion-label position="stacked">Primary</ion-label>
        <ion-progress-bar type="indeterminate" color="primary"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Secondary</ion-label>
        <ion-progress-bar type="indeterminate" color="secondary"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Tertiary</ion-label>
        <ion-progress-bar type="indeterminate" color="tertiary"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Success</ion-label>
        <ion-progress-bar type="indeterminate" color="success"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Warning</ion-label>
        <ion-progress-bar type="indeterminate" color="warning"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Danger</ion-label>
        <ion-progress-bar type="indeterminate" color="danger"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Light</ion-label>
        <ion-progress-bar type="indeterminate" color="light"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Medium</ion-label>
        <ion-progress-bar type="indeterminate" color="medium"></ion-progress-bar>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Dark</ion-label>
        <ion-progress-bar type="indeterminate" color="dark"></ion-progress-bar>
      </ion-item>
    </ion-list>
  </ion-list>


</ion-content>
