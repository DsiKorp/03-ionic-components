<ion-content [fullscreen]="true">
  <swiper-container pager="ios" pagination="true" pagination-bullet-color="white"
    pagination-bullet-active-color="black">
    <swiper-slide class="slide-1">Slide 1</swiper-slide>
    <swiper-slide class="slide-2">Slide 2</swiper-slide>
    <swiper-slide class="slide-3">Slide 3</swiper-slide>
    <swiper-slide *ngFor="let slide of slides" class="slide-2">
      <ion-card mode="ios">
        <img [src]="slide.img" class="slide-image" />

        <ion-card-header>
          <ion-card-subtitle>{{ slide.titulo }}</ion-card-subtitle>
        </ion-card-header>

        <ion-card-content>
          {{ slide.desc }}
        </ion-card-content>

      </ion-card>
    </swiper-slide>
    <swiper-slide class="slide-1">
      <ion-button (click)="onClick()" expand="block" fill="clear">
        Comenzar
      </ion-button>
    </swiper-slide>

  </swiper-container>
</ion-content>
